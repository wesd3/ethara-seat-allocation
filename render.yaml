# Render Blueprint — deploys backend (web service) + frontend (static site).
# In the Render dashboard: New > Blueprint > point at this repo.
services:
  - type: web
    name: ethara-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    # seed is idempotent (skips if data already present), so it safely
    # re-seeds an empty DB on first boot / after a free-tier restart.
    startCommand: "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.7"

  - type: web
    name: ethara-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      # Set this to the deployed backend URL after the backend is live.
      - key: VITE_API_BASE
        value: "https://ethara-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
