[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes resolve.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_API_BASE in the Netlify UI (Site settings > Environment) to your
# deployed backend URL, e.g. https://ethara-backend.onrender.com
